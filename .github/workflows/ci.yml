name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        # CI covers code only. Tests build their own temp/in-memory SQLite DBs
        # (tmp_path / monkeypatch / :memory:) and need no live data or network.
        # The few tests that import pipeline modules requiring the untracked
        # data/*_reference.csv files skip themselves here and run locally.
        run: python -m pytest -q
